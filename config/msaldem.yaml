# config file for minerva, i.e. directories are different
db:
  url: "sqlite:///./../../data/al/db/msalde.db"
sub_runs:
  config_file: "./config/simulations.yaml"
general:
  store_acquired_variants: false
external_repo:
  clinvar_dir: ~/gitrepo/msalde/data/clinvar
variant_ref:
  db:
    url: "sqlite:///./db/variant_ref.db"
  datasets:
    mc4r:
      input_path: "/home/claudiof/win_wsl_home/data/al/dms/mc4r-dms.tsv"
      wt_path: "/home/claudiof/win_wsl_home/data/al/dms/mc4r-wt.tsv"
embedding_extractor:
  type: esm
  model_name: facebook/esm2_t33_650M_UR50D
  output_dir: /sc/arion/work/fratac01/data/al/esm/fv_64_64
  parameters:
    cache_dir: "./model_cache"
    device: # "cuda"
    batch_size: 8
    quantize: false
    compression1:
      method: window_pooling # options: [none, mean_pooling, max_pooling, window_pooling]
      num_segments: 8
      overlap_fraction: 0.5
      pool_method: mean  # options: [mean, max]
    compression:
      method: fisher_vector
      normalize: true
      num_gaussian_mixture_components: 64
      pca_dim: 64
      random_state: 42
pdb_repository:
  datasets:
    SRC:
      pdb_path: "/home/claudiof/win_wsl_home/data/al/pdb/2src.cif"
