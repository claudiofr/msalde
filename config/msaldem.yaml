        - name: "TM7"
          start: 280
          end: 305
          color: "green"
        - name: "C-tail"
          start: 306
          end: 332
          color: "grey"
    ACVRL1:
      pdb_path: "/home/claudiof/win_wsl_home/data/al/pdb/3myo.cif"
      domains:
        # Kinase domain 206-503
        - name: signal_peptide
          start: 1
          end: 22
          color: yellow
        - name: ECD # extracellular_domain
          start: 23
          end: 118
          color: orange
        - name: TM_Helix # transmembrane_helix
          start: 119
          end: 141
          color: red
        - name: juxtamem # juxtamembrane_region
          start: 142
          end: 175
          color: green
        - name: GS # GS_domain
          start: 176
          end: 205
          color: blue
        - name: Kinase
          start: 206
          end: 503
          color: green
    ACVRL1_LONG:
      pdb_path: "/home/claudiof/win_wsl_home/data/al/pdb/3myo.cif"
      domains:
        # Kinase domain 206-503
        - name: signal_peptide
          start: 1
          end: 22
          color: yellow
        - name: extracellular_domain
          start: 23
          end: 118
          color: yellow
        - name: transmembrane_helix
          start: 119
          end: 141
          color: yellow
        - name: juxtamembrane_region
          start: 142
          end: 175
          color: yellow
        - name: GS_domain
          start: 176
          end: 205
          color: blue
        - name: N_lobe
          start: 206
          end: 209
          color: green
        - name: glycine_rich_loop
          # ATP binding lid
          start: 210
          end: 216
          color: yellow
        - name: VAIK_motif
          # β3-lysine that anchors ATP
          start: 229
          end: 235
          color: yellow
        - name: alphaC_helix
          # Regulatory helix; Glu forms salt bridge with β3-Lys
          start: 248
          end: 266
          color: yellow
        - name: catalytic_loop_HRD
          # Catalytic base and substrate-positioning residues
          start: 328
          end: 336
          color: green
        - name: activation_loop_DFG
          # Mg2+ coordination; DFG-in conformation
          start: 351
          end: 353
          color: blue
        - name: activation_loop
          # A-loop; adopts inhibitor-stabilized conformation
          start: 354
          end: 387
          color: blue
        - name: P_plus_1_loop
          # Substrate positioning loop
          start: 388
          end: 395
          color: blue
        - name: C_lobe
          start: 396
          end: 503
          color: grey
